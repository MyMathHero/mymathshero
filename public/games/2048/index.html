<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Crunch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A1A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    color: white;
    padding: 16px;
  }
  h1 {
    color: #C49A1A;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  #stats {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
  }
  .stat {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(196,154,26,0.3);
    border-radius: 10px;
    padding: 8px 20px;
    text-align: center;
  }
  .stat label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
  }
  .stat span {
    font-size: 20px;
    font-weight: 800;
    color: #C49A1A;
  }
  #grid-wrap {
    background: rgba(196,154,26,0.1);
    border: 2px solid rgba(196,154,26,0.3);
    border-radius: 12px;
    padding: 8px;
    position: relative;
    touch-action: none;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(4, 80px);
    gap: 8px;
  }
  .cell {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    transition: all 0.1s ease;
  }
  #new-btn {
    margin-top: 14px;
    background: rgba(196,154,26,0.2);
    border: 1.5px solid #C49A1A;
    color: #C49A1A;
    border-radius: 10px;
    padding: 10px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  #msg {
    position: absolute;
    inset: 0;
    background: rgba(10,10,26,0.92);
    border-radius: 10px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  #msg h2 {
    font-size: 28px;
    color: #C49A1A;
    margin-bottom: 8px;
  }
  #msg p {
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
  }
  #msg button {
    background: linear-gradient(135deg, #C49A1A, #FFD700);
    color: #0A0A1A;
    border: none;
    border-radius: 10px;
    padding: 12px 30px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
  }
  @media (max-width: 400px) {
    #grid { grid-template-columns: repeat(4, 68px); grid-template-rows: repeat(4, 68px); }
    .cell { width: 68px; height: 68px; font-size: 20px; }
  }
</style>
</head>
<body>
<h1>🔢 Number Crunch</h1>
<div id="stats">
  <div class="stat"><label>Score</label><span id="score">0</span></div>
  <div class="stat"><label>Best</label><span id="best">0</span></div>
</div>
<div id="grid-wrap">
  <div id="grid"></div>
  <div id="msg">
    <h2 id="msg-title">Game Over!</h2>
    <p id="msg-sub">No more moves</p>
    <button onclick="newGame()">▶ Play Again</button>
  </div>
</div>
<button id="new-btn" onclick="newGame()">New Game</button>

<script>
const LS={ get:function(k){try{return localStorage.getItem(k)}catch(e){return null}}, set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}} };
const TILE_COLORS = {
  2:    { bg: '#1B2B4B', fg: 'white' },
  4:    { bg: '#2D4A7A', fg: 'white' },
  8:    { bg: '#C49A1A', fg: '#0A0A1A' },
  16:   { bg: '#F97316', fg: 'white' },
  32:   { bg: '#EF4444', fg: 'white' },
  64:   { bg: '#DC2626', fg: 'white' },
  128:  { bg: '#22C55E', fg: 'white' },
  256:  { bg: '#16A34A', fg: 'white' },
  512:  { bg: '#A020F0', fg: 'white' },
  1024: { bg: '#7C3AED', fg: 'white' },
  2048: { bg: '#FFD700', fg: '#0A0A1A' },
}

let board, score, best, won

function newGame() {
  board = Array(4).fill(null).map(() => Array(4).fill(0))
  score = 0
  won = false
  document.getElementById('msg').style.display = 'none'
  best = parseInt(LS.get('2048_best') || '0')
  document.getElementById('best').textContent = best
  addTile(); addTile()
  render()
}

function addTile() {
  const empty = []
  board.forEach((row, r) =>
    row.forEach((v, c) => { if (!v) empty.push([r, c]) })
  )
  if (!empty.length) return
  const [r, c] = empty[Math.floor(Math.random() * empty.length)]
  board[r][c] = Math.random() < 0.9 ? 2 : 4
}

function render() {
  const grid = document.getElementById('grid')
  grid.innerHTML = ''
  board.forEach(row => row.forEach(v => {
    const cell = document.createElement('div')
    cell.className = 'cell'
    if (v) {
      cell.textContent = v
      const col = TILE_COLORS[v] ||
        { bg: '#FFD700', fg: '#0A0A1A' }
      cell.style.background = col.bg
      cell.style.color = col.fg
      cell.style.fontSize = v >= 1000
        ? '18px' : v >= 100 ? '22px' : '26px'
    }
    grid.appendChild(cell)
  }))
  document.getElementById('score').textContent = score
  if (score > best) {
    best = score
    LS.set('2048_best', best)
    document.getElementById('best').textContent = best
  }
}

function slide(row) {
  let arr = row.filter(v => v)
  let gained = 0
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2
      gained += arr[i]
      if (arr[i] === 2048 && !won) {
        won = true
        setTimeout(showWin, 200)
      }
      arr[i + 1] = 0
      i++
    }
  }
  arr = arr.filter(v => v)
  while (arr.length < 4) arr.push(0)
  score += gained
  return arr
}

function move(dir) {
  const prev = JSON.stringify(board)
  if (dir === 'left') {
    board = board.map(row => slide(row))
  } else if (dir === 'right') {
    board = board.map(row => slide([...row].reverse()).reverse())
  } else if (dir === 'up') {
    board = transpose(board.map((_, i) =>
      board.map(r => r[i])
    ).map(row => slide(row)))
  } else if (dir === 'down') {
    board = transpose(board.map((_, i) =>
      board.map(r => r[i])
    ).map(row => slide([...row].reverse()).reverse()))
  }
  if (JSON.stringify(board) !== prev) {
    addTile()
    render()
    if (isGameOver()) showGameOver()
  }
}

function transpose(matrix) {
  return matrix[0].map((_, i) => matrix.map(r => r[i]))
}

function isGameOver() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (!board[r][c]) return false
      if (c < 3 && board[r][c] === board[r][c+1]) return false
      if (r < 3 && board[r][c] === board[r+1][c]) return false
    }
  return true
}

function showGameOver() {
  const m = document.getElementById('msg')
  document.getElementById('msg-title').textContent = 'Game Over!'
  document.getElementById('msg-sub').textContent =
    `Score: ${score}`
  m.style.display = 'flex'
}

function showWin() {
  const m = document.getElementById('msg')
  document.getElementById('msg-title').textContent = '🏆 You Win!'
  document.getElementById('msg-sub').textContent =
    `You reached 2048! Score: ${score}`
  m.style.display = 'flex'
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowLeft: 'left', ArrowRight: 'right',
    ArrowUp: 'up', ArrowDown: 'down'
  }
  if (map[e.key]) { move(map[e.key]); e.preventDefault() }
})

let sx, sy
document.getElementById('grid-wrap')
  .addEventListener('touchstart', e => {
    sx = e.touches[0].clientX
    sy = e.touches[0].clientY
    e.preventDefault()
  }, { passive: false })
document.getElementById('grid-wrap')
  .addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx
    const dy = e.changedTouches[0].clientY - sy
    if (Math.abs(dx) > Math.abs(dy)) {
      move(dx > 20 ? 'right' : 'left')
    } else {
      move(dy > 20 ? 'down' : 'up')
    }
    e.preventDefault()
  }, { passive: false })

newGame()
</script>
</body>
</html>
