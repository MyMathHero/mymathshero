<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Pop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0A0A1A; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 100vh;
    font-family: -apple-system, sans-serif; color: white; overflow: hidden;
    user-select: none;
  }
  h1 { color: #C49A1A; font-size: 22px; font-weight: 900; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
  #score-bar { display: flex; gap: 28px; margin-bottom: 10px; font-size: 15px; font-weight: 700; }
  #score { color: #C49A1A; } #best { color: rgba(255,255,255,0.5); } #time { color: #60A5FA; }
  canvas { border: 2px solid rgba(196,154,26,0.4); border-radius: 12px; display: block; touch-action: none; background: #10162B; }
  #message { margin-top: 14px; font-size: 17px; font-weight: 700; color: #C49A1A; min-height: 26px; text-align: center; }
  #instructions { margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; }
  button { margin-top: 12px; background: linear-gradient(135deg,#C49A1A,#FFD700); color: #1B2B4B;
    border: none; border-radius: 12px; padding: 12px 28px; font-weight: 800; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>
<h1>🫧 Bubble Pop</h1>
<div id="score-bar">
  <span>Score: <span id="score">0</span></span>
  <span>Time: <span id="time">30</span></span>
  <span>Best: <span id="best">0</span></span>
</div>
<canvas id="c" width="340" height="440"></canvas>
<div id="message"></div>
<div id="instructions">Tap the bubbles to pop them before time runs out!</div>
<button id="btn" style="display:none">Play Again</button>
<script>
const LS={ get:k=>{try{return localStorage.getItem(k)}catch(e){return null}}, set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}} };
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const scoreEl = document.getElementById('score'), timeEl = document.getElementById('time'),
      bestEl = document.getElementById('best'), msg = document.getElementById('message'), btn = document.getElementById('btn');
const COLORS = ['#C49A1A','#60A5FA','#34D399','#F87171','#A78BFA','#FBBF24'];
let bubbles = [], score = 0, time = 30, running = false, best = +(LS.get('bubblepop_best')||0), spawnT = 0;
bestEl.textContent = best;

function rnd(a,b){ return a + Math.random()*(b-a); }
function spawn(){
  const r = rnd(16, 30);
  bubbles.push({ x: rnd(r, cv.width-r), y: cv.height + r, r, vy: -rnd(0.7, 2.0),
    color: COLORS[(Math.random()*COLORS.length)|0], wob: Math.random()*6.28, pop: 0 });
}
// Show a "tap to start" state and draw one frame immediately. We only begin the
// animation loop on the first tap — auto-running requestAnimationFrame on load
// stalls inside an iframe until it's visible, which looked like a blank canvas.
function prepare(){
  bubbles = []; score = 0; time = 30; running = false; spawnT = 0;
  scoreEl.textContent = 0; timeEl.textContent = 30; btn.style.display='none';
  msg.textContent = 'Tap anywhere to start!';
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle = '#C49A1A'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🫧 Tap to start', cv.width/2, cv.height/2);
}
function start(){
  bubbles = []; score = 0; time = 30; running = true; spawnT = 0;
  scoreEl.textContent = 0; timeEl.textContent = 30; msg.textContent=''; btn.style.display='none';
  last = performance.now(); requestAnimationFrame(loop);
  clearInterval(timer);
  timer = setInterval(()=>{ if(!running) return; time--; timeEl.textContent = time; if(time<=0) end(); }, 1000);
}
function end(){
  running = false; clearInterval(timer);
  if(score>best){ best=score; LS.set('bubblepop_best',best); bestEl.textContent=best; }
  msg.textContent = 'Time! You popped ' + score + ' 🎉'; btn.style.display='inline-block';
}
let last = 0, timer;
function loop(t){
  if(!running) return;
  const dt = Math.min(40, t-last); last = t;
  spawnT += dt; if(spawnT > 520){ spawnT = 0; spawn(); }
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let i=bubbles.length-1;i>=0;i--){
    const b = bubbles[i];
    if(b.pop>0){ b.pop += dt*0.02; if(b.pop>1){ bubbles.splice(i,1); continue; } }
    else { b.y += b.vy * dt/16; b.wob += 0.05; b.x += Math.sin(b.wob)*0.4; if(b.y < -b.r) bubbles.splice(i,1); }
    const rr = b.pop>0 ? b.r*(1+b.pop) : b.r, a = b.pop>0 ? 1-b.pop : 1;
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(b.x,b.y,rr,0,6.2832); ctx.fillStyle = b.color; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x-rr*0.3,b.y-rr*0.3,rr*0.25,0,6.2832); ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(loop);
}
function hit(px,py){
  if(!running) return;
  for(let i=bubbles.length-1;i>=0;i--){
    const b = bubbles[i];
    if(b.pop>0) continue;
    if((px-b.x)**2+(py-b.y)**2 <= b.r*b.r){ b.pop = 0.01; score++; scoreEl.textContent = score; return; }
  }
}
function coords(e){
  const r = cv.getBoundingClientRect(), t = e.touches ? e.touches[0] : e;
  return [ (t.clientX-r.left)*(cv.width/r.width), (t.clientY-r.top)*(cv.height/r.height) ];
}
function tap(e, prevent){ if(prevent) e.preventDefault(); if(!running){ start(); return; } const [x,y]=coords(e); hit(x,y); }
cv.addEventListener('mousedown', e=>tap(e,false));
cv.addEventListener('touchstart', e=>tap(e,true), {passive:false});
btn.addEventListener('click', prepare);
prepare();
</script>
</body>
</html>
