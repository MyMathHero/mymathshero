<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Muncher</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#0A0A1A; display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:-apple-system,sans-serif; color:white; overflow:hidden; user-select:none; }
  h1 { color:#C49A1A; font-size:22px; font-weight:900; margin-bottom:8px; letter-spacing:2px; text-transform:uppercase; }
  #score-bar { display:flex; gap:28px; margin-bottom:10px; font-size:15px; font-weight:700; }
  #dots { color:#C49A1A; } #best { color:rgba(255,255,255,0.5); }
  canvas { border:2px solid rgba(196,154,26,0.4); border-radius:12px; display:block; touch-action:none; background:#0B1020; }
  #message { margin-top:14px; font-size:17px; font-weight:700; color:#C49A1A; min-height:26px; text-align:center; }
  #instructions { margin-top:8px; font-size:12px; color:rgba(255,255,255,0.35); text-align:center; }
  button { margin-top:12px; background:linear-gradient(135deg,#C49A1A,#FFD700); color:#1B2B4B; border:none;
    border-radius:12px; padding:12px 28px; font-weight:800; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
<h1>🟡 Maze Muncher</h1>
<div id="score-bar">
  <span>Dots: <span id="dots">0</span></span>
  <span>Best: <span id="best">0</span></span>
</div>
<canvas id="c" width="380" height="380"></canvas>
<div id="message"></div>
<div id="instructions">Eat all the dots, dodge the ghost! Swipe or arrow keys.</div>
<button id="btn" style="display:none">Play Again</button>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const dotsEl=document.getElementById('dots'), bestEl=document.getElementById('best'),
      msg=document.getElementById('message'), btn=document.getElementById('btn');
// 0=wall, 1=dot path. A compact hand-made maze (19x19).
const MAP = [
 "1111111111111111111",
 "1000000010000000001",
 "1011110111110111101",
 "1010000000000000101",
 "1010111011101110101",
 "1000100000000010001",
 "1110101111101010111",
 "1000100010001000001",
 "1011101010101011101",
 "1000001010101000001",
 "1011101010101011101",
 "1000100010001000101",
 "1110101111101010111",
 "1000100000000010001",
 "1010111011101110101",
 "1010000000000000101",
 "1011110111110111101",
 "1000000010000000001",
 "1111111111111111111",
].map(r=>r.split('').map(Number));
const ROWS=MAP.length, COLS=MAP[0].length, TS=cv.width/COLS;
// Safe storage — the arcade iframe is sandboxed without allow-same-origin, so
// localStorage THROWS a SecurityError. Guard it so high-scores are best-effort
// and never crash the game (which left the canvas blank).
const LS={ get:k=>{try{return localStorage.getItem(k)}catch(e){return null}}, set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}} };
let dots, total, eaten, running, best=+(LS.get('maze_best')||0);
let px, py, dir, ndir, ghost;
bestEl.textContent=best;
function prepare(){
  // Set up the board and DRAW it immediately (a still frame), but DON'T start
  // the animation loop until the player makes a move. Auto-starting a
  // requestAnimationFrame loop on load breaks inside an iframe (rAF is throttled
  // while the frame mounts), so we wait for a user gesture like the other games.
  dots = MAP.map(r=>r.slice());
  total=0; eaten=0;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++) if(dots[y][x]===1){ total++; }
  px=9; py=1; dir=[0,0]; ndir=[0,0]; dots[1][9]=2; eaten=0;
  ghost={ x:9, y:9, dir:[0,1], mt:0 };
  running=false; dotsEl.textContent=0; btn.style.display='none';
  msg.textContent='Press an arrow key or swipe to start!';
  draw();
}
function begin(){
  if(running) return;
  running=true; msg.textContent='';
  last=performance.now(); moveAcc=0; ghostAcc=0; requestAnimationFrame(loop);
}
function can(x,y){ return x>=0&&x<COLS&&y>=0&&y<ROWS && MAP[y][x]!==0; }
let last=0, moveAcc=0, ghostAcc=0;
function step(){
  // player
  if(can(px+ndir[0], py+ndir[1])) dir=ndir.slice();
  if(can(px+dir[0], py+dir[1])){ px+=dir[0]; py+=dir[1];
    if(dots[py][px]===1){ dots[py][px]=2; eaten++; dotsEl.textContent=eaten;
      if(eaten>=total){ win(); return; } } }
  // ghost — greedy-ish random walk
  const opts=[[1,0],[-1,0],[0,1],[0,-1]].filter(d=>can(ghost.x+d[0],ghost.y+d[1]));
  if(opts.length){
    // 55% chase player, else random
    let d;
    if(Math.random()<0.55){ opts.sort((a,b)=> (Math.abs(ghost.x+a[0]-px)+Math.abs(ghost.y+a[1]-py)) - (Math.abs(ghost.x+b[0]-px)+Math.abs(ghost.y+b[1]-py)) ); d=opts[0]; }
    else d=opts[(Math.random()*opts.length)|0];
    ghost.x+=d[0]; ghost.y+=d[1];
  }
  if(ghost.x===px && ghost.y===py){ lose(); }
}
function win(){ running=false; if(eaten>best){best=eaten;LS.set('maze_best',best);bestEl.textContent=best;} msg.textContent='You cleared the maze! 🏆'; btn.style.display='inline-block'; }
function lose(){ running=false; if(eaten>best){best=eaten;LS.set('maze_best',best);bestEl.textContent=best;} msg.textContent='Caught! You ate '+eaten+' dots.'; btn.style.display='inline-block'; }
function loop(t){
  if(!running) return;
  const dt=t-last; last=t; moveAcc+=dt; ghostAcc+=dt;
  if(moveAcc>150){ moveAcc=0;
    if(can(px+ndir[0],py+ndir[1])) dir=ndir.slice();
    if(can(px+dir[0],py+dir[1])){ px+=dir[0]; py+=dir[1];
      if(dots[py][px]===1){ dots[py][px]=2; eaten++; dotsEl.textContent=eaten; if(eaten>=total){ win(); return; } }
    }
  }
  if(ghostAcc>230){ ghostAcc=0;
    const opts=[[1,0],[-1,0],[0,1],[0,-1]].filter(d=>can(ghost.x+d[0],ghost.y+d[1]));
    if(opts.length){ let d;
      if(Math.random()<0.5){ opts.sort((a,b)=>(Math.abs(ghost.x+a[0]-px)+Math.abs(ghost.y+a[1]-py))-(Math.abs(ghost.x+b[0]-px)+Math.abs(ghost.y+b[1]-py))); d=opts[0]; }
      else d=opts[(Math.random()*opts.length)|0];
      ghost.x+=d[0]; ghost.y+=d[1]; }
    if(ghost.x===px&&ghost.y===py){ lose(); return; }
  }
  draw(); requestAnimationFrame(loop);
}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(MAP[y][x]===0){ ctx.fillStyle='#2D4A7A'; ctx.fillRect(x*TS+1,y*TS+1,TS-2,TS-2); }
    else if(dots[y][x]===1){ ctx.fillStyle='#C49A1A'; ctx.beginPath(); ctx.arc(x*TS+TS/2,y*TS+TS/2,TS*0.16,0,6.2832); ctx.fill(); }
  }
  ctx.font=TS+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('👻', ghost.x*TS+TS/2, ghost.y*TS+TS/2);
  ctx.fillStyle='#FBBF24'; ctx.beginPath(); ctx.arc(px*TS+TS/2,py*TS+TS/2,TS*0.42,0.25,6.03); ctx.lineTo(px*TS+TS/2,py*TS+TS/2); ctx.fill();
}
document.addEventListener('keydown', e=>{
  let handled=true;
  if(e.key==='ArrowLeft')ndir=[-1,0]; else if(e.key==='ArrowRight')ndir=[1,0];
  else if(e.key==='ArrowUp')ndir=[0,-1]; else if(e.key==='ArrowDown')ndir=[0,1];
  else handled=false;
  if(handled){ e.preventDefault(); begin(); }
});
let ts=null;
cv.addEventListener('touchstart', e=>{ const t=e.touches[0]; ts=[t.clientX,t.clientY]; begin(); }, {passive:true});
cv.addEventListener('touchmove', e=>{ e.preventDefault(); if(!ts) return; const t=e.touches[0], dx=t.clientX-ts[0], dy=t.clientY-ts[1];
  if(Math.abs(dx)+Math.abs(dy)>24){ if(Math.abs(dx)>Math.abs(dy)) ndir=[dx>0?1:-1,0]; else ndir=[0,dy>0?1:-1]; ts=[t.clientX,t.clientY]; } }, {passive:false});
btn.addEventListener('click', prepare);
prepare();
</script>
</body>
</html>
